# Svitgrid HA Preset — Deye SG01LP1 US (split-phase, 2-phase).
#
# Solarman HACS profile: deye_hybrid.yaml.
# Same write registers as 1-phase family (US split-phase uses Sunsynk1Phase
# register map per packages/inverter_protocol). phases=2 = US split-phase.

id: deye-sg01lp1-us-solarman-v1
version: "1"
brand: Deye
model: SG01LP1 (US)
phases: 2
hasBattery: true
pvStrings: 2
protocolId: home_assistant_solarman

entityMap:
  batterySoc: sensor.inverter_battery
  batteryPower: sensor.inverter_battery_power
  batteryVoltage: sensor.inverter_battery_voltage
  pv1Power: sensor.inverter_pv1_power
  pv2Power: sensor.inverter_pv2_power
  gridPower: sensor.inverter_grid_power
  loadPower: sensor.inverter_load_power
  dailyPvEnergy: sensor.inverter_today_production
  gridVoltageL1: sensor.inverter_grid_l1_voltage
  gridVoltageL2: sensor.inverter_grid_l2_voltage

commands:
  - id: set_battery_charge
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 256
      value: "int(payload.chargePowerLimitW)"
  - id: set_work_mode
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 244
      value: "int(payload.workMode)"
  - id: set_solar_sell
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 247
      value: "int(payload.solarSell)"
  - id: set_grid_charge_toggle
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 248
      value: "int(payload.enabled)"
