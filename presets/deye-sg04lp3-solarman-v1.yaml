# Svitgrid HA Preset — Deye SG04LP3 (3-phase low-voltage hybrid) via Solarman.
#
# Solarman HACS profile to pick during HA's Solarman setup: deye_hybrid.yaml.
#
# Register references: packages/inverter_protocol/lib/src/writers/
#   battery_charge_registers.dart   (3-phase: power 154-159, time 148-153, soc 166-171)
#   work_mode_registers.dart        (3-phase: 142)
#   solar_sell_executor.dart        (3-phase: 145)
#   grid_charge_toggle_executor.dart (3-phase: 146)
# Verified live on SG04LP3 (ivanon2@gmail.com, 2026-05-22+).
#
# v3 (2026-05-23):
#   - FIX: set_battery_charge was writing register 152 (slot 4 time) instead of 154
#     (slot 1 power) and using SMG-II current-divided formula. Corrected to
#     direct watts.
#   - FIX: set_grid_charge_toggle was 143; correct is 146.
#   - Added gridVoltageL2/L3 to entityMap.
#
# v4 (2026-06-10):
#   - Added per-phase powers gridPowerL1-3 / loadPowerL1-3 (Solarman deye_p3
#     profile "Grid Lx Power" regs 622-624, "Load Lx Power" regs 633-635).
#     The API folds them into phaseGridPowers / phaseLoads at ingest.
# v5 (2026-06-25): added daily load/import/export energy mappings (Solarman today_* sensors).
# v6 (2026-06-25): added Tier-1 telemetry (inverter/battery temp, battery current, grid frequency).
# v7 (2026-06-25): added Tier-2 daily energy (battery charge/discharge, generator).

id: deye-sg04lp3-solarman-v1
version: "7"
brand: Deye
model: SG04LP3
phases: 3
hasBattery: true
pvStrings: 2
protocolId: home_assistant_solarman

entityMap:
  batterySoc: sensor.inverter_battery
  batteryPower: sensor.inverter_battery_power
  batteryVoltage: sensor.inverter_battery_voltage
  pv1Power: sensor.inverter_pv1_power
  pv2Power: sensor.inverter_pv2_power
  gridPower: sensor.inverter_grid_power
  loadPower: sensor.inverter_load_power
  dailyPvEnergy: sensor.inverter_today_production
  # Daily energy counters from the Solarman hybrid profile (today_* sensors).
  dailyLoadEnergy: sensor.inverter_today_load_consumption
  dailyGridImportEnergy: sensor.inverter_today_energy_import
  dailyGridExportEnergy: sensor.inverter_today_energy_export
  gridVoltageL1: sensor.inverter_grid_l1_voltage
  gridVoltageL2: sensor.inverter_grid_l2_voltage
  gridVoltageL3: sensor.inverter_grid_l3_voltage
  # Per-phase powers (Solarman deye_p3 profile: "Grid Lx Power" regs 622-624,
  # "Load Lx Power" regs 633-635). The API folds these scalars into its
  # canonical phaseGridPowers / phaseLoads arrays at ingest.
  gridPowerL1: sensor.inverter_grid_l1_power
  gridPowerL2: sensor.inverter_grid_l2_power
  gridPowerL3: sensor.inverter_grid_l3_power
  loadPowerL1: sensor.inverter_load_l1_power
  loadPowerL2: sensor.inverter_load_l2_power
  loadPowerL3: sensor.inverter_load_l3_power
  # Tier-1 telemetry (Solarman): inverter/battery temp, battery current, grid frequency.
  batteryTemperature: sensor.inverter_battery_temperature
  batteryCurrent: sensor.inverter_battery_current
  gridFrequency: sensor.inverter_grid_frequency
  inverterTemperature: sensor.inverter_temperature
  # Tier-2 daily energy (Solarman today_* counters).
  dailyBatteryChargeEnergy: sensor.inverter_today_battery_charge
  dailyBatteryDischargeEnergy: sensor.inverter_today_battery_discharge
  dailyGeneratorEnergy: sensor.inverter_generator_energy_today

commands:
  # Force-charge: write the slot-1 charge power limit (watts, no scaling).
  - id: set_battery_charge
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 154
      value: "int(payload.chargePowerLimitW)"

  # 0=Selling First, 1=Zero Export to Load, 2=Self Use.
  - id: set_work_mode
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 142
      value: "int(payload.workMode)"

  # Solar-sell enable bit. Payload field: solarSell (0/1).
  - id: set_solar_sell
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 145
      value: "int(payload.solarSell)"

  # Grid-charge enable bit. Payload field: enabled (0/1).
  # NOTE: bits 1-7 of this register encode the day-of-week schedule; this
  # naive write zeroes them. Acceptable for the immediate "toggle on/off"
  # use case; full preserve-bits semantics will land when we add
  # read-modify-write to the dispatcher.
  - id: set_grid_charge_toggle
    service: modbus.write_register
    args:
      hub: config.hub_name
      slave: config.slave_id
      address: 146
      value: "int(payload.enabled)"
